name: Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Nim
      uses: iffy/install-nim@v5

    - name: Build
      run: |
        nimble install

    - name: Compile Wayland tests
      run: |
        nimble test
